<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Prompt Magic - BYOK Settings</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            padding: 24px;
            width: 320px;
            margin: 0;
        }

        h2 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #f8fafc;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 0.9rem;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }

        .status {
            margin-top: 12px;
            font-size: 0.8rem;
            text-align: center;
            color: #a3e635;
            min-height: 16px;
        }
    </style>
</head>

<body>
    <h2>✨ Prompt Magic Vault</h2>
    <div class="group"><label for="apiKey">Cloud API Key (BYOK)</label><input type="password" id="apiKey"
            placeholder="sk-..." autocomplete="off" /></div>
    <div class="group"><label for="provider">Provider / Model</label><input type="text" id="provider"
            placeholder="e.g., gpt-4o or claude-3-5-sonnet" value="gpt-4o" /></div>
    <div class="group"><button id="saveBtn">Save Configuration</button></div>
    <div id="status" class="status"></div>

    <script src="options.js"></script>
</body>

</html>
