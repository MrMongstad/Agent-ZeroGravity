name = "lfs-r2-proxy"
main = "src/index.ts"
compatibility_date = "2024-04-27"

# Production Bindings
# Set these via 'wrangler secret put'
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY

[vars]
# You can set defaults here if you don't want to use the URL-based credentials
# R2_ENDPOINT = "ACCOUNT_ID.r2.cloudflarestorage.com"
# R2_BUCKET = "your-lfs-bucket"

[observability]
enabled = true
