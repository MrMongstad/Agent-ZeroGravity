<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Prompt Magic Library</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      padding: 16px;
      margin: 0;
    }

    h2 {
      color: #38bdf8;
      font-size: 1.25rem;
      margin-top: 0;
      border-bottom: 1px solid #334155;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      font-size: 0.9rem;
    }

    textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
      transition: background 0.2s;
      margin-bottom: 20px;
    }

    button:hover {
      background: #7dd3fc;
    }

    .prompt-item {
      background: #1e293b;
      padding: 14px;
      border-radius: 6px;
      margin-bottom: 12px;
      border: 1px solid #334155;
    }

    .prompt-text {
      font-size: 0.85rem;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cbd5e1;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn-copy {
      background: #10b981;
      color: white;
      width: auto;
      flex: 1;
      margin: 0;
      padding: 8px;
      font-size: 0.85rem;
    }

    .btn-copy:hover {
      background: #34d399;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
      width: auto;
      flex: 1;
      margin: 0;
      padding: 8px;
      font-size: 0.85rem;
    }

    .btn-delete:hover {
      background: #f87171;
    }

    .empty-state {
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>

<body>
  <h2>📚 Prompt Library</h2>
  <textarea id="newPromptText" placeholder="Paste a favorite prompt framework here..."></textarea>
  <button id="addPromptBtn">Save to Library</button>
  <div id="promptList"></div>
  <script type="module" src="sidepanel.js"></script>
</body>

</html>
