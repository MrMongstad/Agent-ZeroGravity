<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonic V3 Settings</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      width: 300px;
      margin: 0;
      padding: 20px;
    }
    h2 {
      margin: 0 0 20px 0;
      font-size: 1.1rem;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .setting-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #38bdf8;
    }
    .val-display {
      float: right;
      color: #38bdf8;
      font-weight: 600;
    }
    .footer {
      border-top: 1px solid #1e293b;
      padding-top: 15px;
      font-size: 0.75rem;
      color: #64748b;
      text-align: center;
    }
    .badge {
      background: #1e293b;
      color: #38bdf8;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      border: 1px solid #334155;
    }
  </style>
</head>
<body>
  <h2>🔊 Sonic Reader <span class="badge">V3</span></h2>
  
  <div class="setting-group">
    <label>Reading Speed <span id="speedVal" class="val-display">1.0x</span></label>
    <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>

  <div class="setting-group">
    <label>Voice Pitch <span id="pitchVal" class="val-display">1.0</span></label>
    <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>

  <div class="footer">
    Sonic Reader V3: Active Overlay Mode
  </div>

  <script src="popup.js"></script>
</body>
</html>
